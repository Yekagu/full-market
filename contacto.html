<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Contacto - Full Market</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF9E6; /* Amarillo claro */
            margin: 0;
            text-align: center;
        }
        h1, h3 {
            color: #FF4081; /* Rosa */
        }
        nav {
            background-color: #FF4081;
            padding: 15px;
        }
        nav a {
            color: #FFFFFF;
            font-weight: bold;
            text-decoration: none;
            margin: 0 10px;
        }
        nav a:hover {
            color: #FFF176;
        }
        .cuadro-contacto {
            background-color: white;
            border: 2px solid #FF4081;
            width: 70%;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }
        /* REQUISITO: Formulario de nivel preparatoria */
        .campo {
            margin-bottom: 15px;
        }
        .campo label {
            display: block;
            font-weight: bold;
            color: #FF4081;
            margin-bottom: 5px;
        }
        .campo input, .campo textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #FF4081;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .boton-enviar {
            background-color: #FFF176;
            color: #333;
            font-weight: bold;
            border: 2px solid #FF4081;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }
        .boton-enviar:hover {
            background-color: #FF4081;
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">INICIO</a> | 
        <a href="catalogo.html">PRODUCTOS</a> | 
        <a href="contacto.html">CONTACTO</a> | 
        <a href="nosotros.html">NOSOTROS</a> | 
        <a href="ubicacion.html">UBICACIÓN</a>
    </nav>

    <h1>PÁGINA DE CONTACTO</h1>

    <div class="cuadro-contacto">
        <h3>Nuestros Datos:</h3>
        <p><b>Dirección:</b> Calle Falsa 123, Colonia Centro, Ciudad Juárez.</p>
        <p><b>Teléfono:</b> 656-123-45-67</p>
        <p><b>Horario:</b> Lunes a Sábado de 8:00 AM a 9:00 PM.</p>

        <form action="#" method="post" style="margin-top: 20px; background-color: #FFFDE7; padding: 15px; border-radius: 6px;">
            <h3 style="text-align: center; margin-top: 0;">Déjanos un Mensaje</h3>
            
            <div class="campo">
                <label>Nombre Completo:</label>
                <input type="text" placeholder="Escribe tu nombre aquí" required>
            </div>

            <div class="campo">
                <label>Correo Electrónico:</label>
                <input type="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="campo">
                <label>Tu Comentario / Sugerencia:</label>
                <textarea rows="4" placeholder="¿En qué te podemos ayudar?" required></textarea>
            </div>

            <div style="text-align: center;">
                <input type="submit" value="Enviar Formulario" class="boton-enviar">
            </div>
        </form>
    </div>

    <p><img src="fruits-and-vegetables-in-spanish.jpg" width="90%" style="max-width:500px; height:auto; border-radius: 8px;" alt="Frutas"/></p>

    <br>
    <a href="index.html" style="color: #FF4081; font-weight: bold;">&larr; Volver a la página principal</a>
    <br><br>

</body>
</html>
